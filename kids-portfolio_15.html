<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="הקופה שלי">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#050508">
<title>הקופה שלי 🐷</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230f0f13'/><text y='.9em' font-size='72' x='50%' text-anchor='middle'>🐷</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Secular+One&family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050508;--surface:#0d0d1a;--surface2:#12122a;
    --accent:#b044ff;--accent2:#00f5ff;--accent3:#ff3366;--accent4:#ffe600;
    --text:#e0e0ff;--muted:#5a5a8a;--border:#1e1e3a;--radius:14px;
    --neon-purple:rgba(176,68,255,.6);--neon-cyan:rgba(0,245,255,.5);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Secular One',sans-serif;background:var(--bg);color:var(--text);
    min-height:100vh;padding:24px 16px 100px;position:relative;overflow-x:hidden;
    background-image:
      radial-gradient(ellipse at 10% 0%,rgba(176,68,255,.12) 0%,transparent 50%),
      radial-gradient(ellipse at 90% 100%,rgba(0,245,255,.08) 0%,transparent 50%),
      radial-gradient(ellipse at 50% 50%,rgba(255,54,102,.04) 0%,transparent 70%);
  }
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(176,68,255,.015) 40px,rgba(176,68,255,.015) 41px),
      repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(0,245,255,.015) 40px,rgba(0,245,255,.015) 41px);
  }
  body>*{position:relative;z-index:1;}
  h1{font-family:'Orbitron',monospace;font-size:1.6rem;font-weight:900;text-align:center;margin-bottom:4px;
    letter-spacing:2px;text-transform:uppercase;
    background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    filter:drop-shadow(0 0 20px rgba(176,68,255,.4));
  }
  .subtitle{text-align:center;color:var(--muted);font-size:.8rem;margin-bottom:22px;letter-spacing:2px;text-transform:uppercase;font-family:'Share Tech Mono',monospace;}
  /* ── DASHBOARD ROW ── */
  .dashboard-row{display:flex;gap:14px;margin-bottom:18px;align-items:stretch;}
  .pie-wrap{flex:0 0 180px;background:var(--surface);border:1px solid rgba(176,68,255,.25);border-radius:var(--radius);padding:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;box-shadow:0 0 30px rgba(176,68,255,.08);}
  .pie-total-label{font-size:.7rem;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;text-align:center;}
  .pie-total-val{font-size:1.6rem;font-weight:800;font-family:'Share Tech Mono',monospace;color:var(--text);text-align:center;text-shadow:0 0 15px rgba(0,245,255,.5);}
  .cards-col{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  .sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:18px;}
  .sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;position:relative;overflow:hidden;transition:border-color .3s;}
  .sum-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
  .sum-card::after{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s;border-radius:var(--radius);}
  .sum-card.gold::before{background:linear-gradient(90deg,var(--accent),transparent);box-shadow:0 0 10px var(--accent);}
  .sum-card.gold{border-color:rgba(176,68,255,.3);}
  .sum-card.green::before{background:linear-gradient(90deg,var(--accent2),transparent);box-shadow:0 0 10px var(--accent2);}
  .sum-card.green{border-color:rgba(0,245,255,.3);}
  .sum-card.red::before{background:linear-gradient(90deg,var(--accent3),transparent);}
  .sum-card.red{border-color:rgba(255,51,102,.3);}
  .sum-card.blue::before{background:linear-gradient(90deg,#b044ff,transparent);}
  .sum-card.blue{border-color:rgba(176,68,255,.3);}
  @media(max-width:420px){.dashboard-row{flex-direction:column;}.pie-wrap{flex:none;width:100%;box-sizing:border-box;flex-direction:row;gap:20px;}.cards-col{grid-template-columns:1fr 1fr;}}
  .c-lbl{font-size:.85rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
  .c-val{font-family:'Share Tech Mono',monospace;font-size:1.8rem;font-weight:700;line-height:1;}
  .c-val.gold{color:var(--accent);text-shadow:0 0 12px rgba(176,68,255,.6);}.c-val.green{color:var(--accent2);text-shadow:0 0 12px rgba(0,245,255,.5);}.c-val.red{color:var(--accent3);text-shadow:0 0 12px rgba(255,51,102,.5);}.c-val.blue{color:var(--accent);text-shadow:0 0 12px rgba(176,68,255,.5);}
  .c-sub{font-size:.8rem;color:var(--muted);margin-top:4px;font-family:'Share Tech Mono',monospace;}
  .perf-box{background:var(--surface);border:1px solid rgba(176,68,255,.25);border-radius:var(--radius);margin-bottom:18px;overflow:hidden;box-shadow:0 0 20px rgba(176,68,255,.05);}
  .perf-tabs{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--border);}
  .p-tab{padding:9px;text-align:center;font-size:.8rem;font-weight:600;cursor:pointer;color:var(--muted);border:none;background:none;font-family:'Secular One',sans-serif;transition:all .2s;}
  .p-tab.active{color:var(--accent2);background:rgba(0,245,255,.07);border-bottom:2px solid var(--accent2);}
  .perf-body{padding:16px;}
  .perf-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  .p-card{background:var(--surface2);border-radius:10px;padding:11px;text-align:center;}
  .p-card .pl{font-size:.82rem;color:var(--muted);margin-bottom:4px;}
  .p-card .pv{font-family:'Share Tech Mono',monospace;font-size:1.2rem;font-weight:700;}
  .p-card .pv.pos{color:var(--accent2);}.p-card .pv.neg{color:var(--accent3);}.p-card .pv.neu{color:var(--text);}
  .p-note{font-size:.65rem;color:var(--muted);text-align:center;margin-top:9px;}
  .section{background:var(--surface);border:1px solid rgba(176,68,255,.2);border-radius:var(--radius);margin-bottom:18px;overflow:hidden;}
  .sec-hdr{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
  .sec-title{font-size:1rem;font-weight:700;letter-spacing:.5px;}
  .sec-body{padding:16px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px;}
  .fg{display:flex;flex-direction:column;gap:4px;}
  .fg.full{grid-column:1/-1;}
  label{font-size:.74rem;color:var(--muted);font-weight:500;}
  input{background:var(--surface2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:.86rem;padding:9px 13px;width:100%;transition:border-color .2s;outline:none;direction:ltr;text-align:right;}
  input[type="text"]{direction:rtl;}
  input::placeholder{color:var(--muted);opacity:.55;}
  input:focus{border-color:var(--accent2);}
  .btn{width:100%;padding:11px;border:none;border-radius:9px;font-family:'Secular One',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s;}
  .btn-y{background:linear-gradient(135deg,var(--accent),#7722cc);color:#fff;letter-spacing:1px;text-transform:uppercase;box-shadow:0 0 20px rgba(176,68,255,.4);}.btn-y:hover:not(:disabled){filter:brightness(1.15);transform:translateY(-1px);box-shadow:0 0 30px rgba(176,68,255,.6);}.btn-y:disabled{opacity:.45;cursor:not-allowed;}
  .btn-g{background:linear-gradient(135deg,var(--accent2),#0099aa);color:#050508;letter-spacing:1px;text-transform:uppercase;box-shadow:0 0 15px rgba(0,245,255,.3);}.btn-g:hover{filter:brightness(1.1);box-shadow:0 0 25px rgba(0,245,255,.5);}
  .btn-c{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
  .ai-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(0,245,255,.06);border:1px solid rgba(0,245,255,.25);border-radius:20px;padding:3px 10px;font-size:.68rem;color:var(--accent2);margin-bottom:10px;letter-spacing:1px;text-transform:uppercase;}
  .h-list{display:flex;flex-direction:column;gap:9px;}
  .h-item{background:var(--surface2);border:1px solid rgba(176,68,255,.15);border-radius:12px;padding:13px;position:relative;transition:border-color .2s;}
  .h-item.loading{opacity:.6;}
  .h-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
  .h-id{font-family:'Share Tech Mono',monospace;font-weight:700;font-size:1.1rem;color:var(--accent2);}
  .h-name{font-size:.9rem;color:var(--muted);margin-top:2px;line-height:1.3;}
  .h-meta{font-size:.67rem;color:var(--muted);margin-top:3px;}
  .h-val{text-align:left;font-family:'Share Tech Mono',monospace;flex-shrink:0;margin-right:8px;}
  .h-val .hcur{font-size:1.3rem;font-weight:700;color:var(--accent2);text-shadow:0 0 10px rgba(0,245,255,.4);}
  .h-val .hcost{font-size:.67rem;color:var(--muted);margin-top:2px;}
  .s-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:.8rem;}
  .st{text-align:center;}.stl{color:var(--muted);margin-bottom:2px;}.stv{font-family:'Share Tech Mono',monospace;font-weight:600;font-size:.85rem;}
  .pos{color:var(--accent2);}.neg{color:var(--accent3);}
  .tag{display:inline-block;font-size:.61rem;padding:2px 7px;border-radius:20px;font-weight:600;margin-top:3px;}
  .tag-g{background:rgba(74,240,160,.15);color:var(--accent2);}.tag-l{background:rgba(240,112,112,.15);color:var(--accent3);}.tag-p{background:rgba(122,122,154,.15);color:var(--muted);}
  .h-actions{display:flex;gap:6px;margin-top:9px;padding-top:9px;border-top:1px solid var(--border);}
  .a-btn{flex:1;padding:6px;border:1px solid var(--border);border-radius:7px;background:none;color:var(--muted);font-family:'Secular One',sans-serif;font-size:.74rem;cursor:pointer;transition:all .2s;}
  .a-btn:hover{border-color:var(--accent);color:var(--accent);}.a-btn.del:hover{border-color:var(--accent3);color:var(--accent3);}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;width:100%;max-width:370px;}
  .modal h3{font-size:.93rem;margin-bottom:14px;color:var(--accent);}
  .modal-btns{display:flex;gap:9px;margin-top:12px;}
  .cash-row{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:11px 13px;margin-bottom:8px;}
  .empty{text-align:center;color:var(--muted);padding:16px;font-size:.84rem;}
  .refresh-btn{background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--muted);cursor:pointer;font-size:.74rem;padding:5px 11px;font-family:'Secular One',sans-serif;transition:all .2s;}
  .refresh-btn:hover{border-color:var(--accent);color:var(--accent);}
  .status{font-size:.68rem;color:var(--muted);text-align:center;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:5px;min-height:15px;font-family:'Share Tech Mono',monospace;}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);animation:pulse 2s infinite;box-shadow:0 0 8px var(--accent2);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
  .spin{display:inline-block;width:11px;height:11px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg)}}
  .err-box{color:var(--accent3);font-size:.72rem;margin:5px 0 8px;padding:8px 12px;background:rgba(240,112,112,.1);border-radius:8px;display:none;}
  hr{border:none;border-top:1px solid var(--border);margin:11px 0;}
  .price-loading{display:inline-block;width:60px;height:12px;background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:4px;}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body style="padding-bottom: env(safe-area-inset-bottom);">

<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
<h1>🐷 הקופה של <span id="kidName" onclick="editName()" style="cursor:pointer;color:var(--accent);border-bottom:2px dashed var(--accent)">הילד</span></h1>
<button onclick="openSettings()" style="background:var(--surface2);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:14px">⚙️ הגדרות</button>
</div>
<p class="subtitle">בורסה ת"א · מחירים חיים · מס 25% &nbsp;<span id="fxRate" style="color:var(--accent2);opacity:.8;"></span></p>

<!-- Settings Modal -->
<div id="settingsModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;display:none;align-items:center;justify-content:center">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:420px;width:90%;direction:rtl">
    <h2 style="margin-bottom:16px;font-size:18px">⚙️ הגדרות</h2>
    <label style="display:block;font-size:13px;color:var(--text2);margin-bottom:6px">🔑 Anthropic API Key<br><span style="font-size:11px;color:var(--text2)">(נדרש לניירות TASE כגון 1159169, 5139886)</span></label>
    <input id="apiKeyInput" type="password" placeholder="sk-ant-..." style="width:100%;box-sizing:border-box;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;direction:ltr;margin-bottom:16px">
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button onclick="closeSettings()" style="background:var(--surface2);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:8px 18px;cursor:pointer">ביטול</button>
      <button onclick="saveSettings()" style="background:var(--accent);border:none;color:#000;border-radius:8px;padding:8px 18px;cursor:pointer;font-weight:700">שמור</button>
    </div>
  </div>
</div>

<div class="dashboard-row">
  <!-- PIE CHART -->
  <div class="pie-wrap">
    <div class="pie-total-label">סה״כ תיק</div>
    <div class="pie-total-val" id="sGross">₪0</div>
    <canvas id="pieChart" width="130" height="130"></canvas>
    <div id="pieLegend" style="display:flex;flex-direction:column;gap:5px;width:100%"></div>
  </div>
  <!-- 4 CARDS -->
  <div class="cards-col">
    <div class="sum-card gold"><div class="c-lbl">שווי ניירות</div><div class="c-val gold" id="sStocks">₪0</div><div class="c-sub" id="sGain"></div></div>
    <div class="sum-card blue"><div class="c-lbl">מזומן / חיסכון</div><div class="c-val blue" id="sCash">₪0</div></div>
    <div class="sum-card green"><div class="c-lbl">רווח כולל</div><div class="c-val green" id="sTotalGain">₪0</div></div>
    <div class="sum-card red"><div class="c-lbl">אחרי מס 25%</div><div class="c-val red" id="sNet">₪0</div><div class="c-sub">בעת מימוש</div></div>
  </div>
</div>

<div class="status" id="status">מאתחל...</div>

<div class="perf-box">
  <div class="perf-tabs">
    <button class="p-tab active" onclick="setPeriod('day',this)">📅 יומי</button>
    <button class="p-tab" onclick="setPeriod('month',this)">📆 חודשי</button>
    <button class="p-tab" onclick="setPeriod('year',this)">🗓 שנתי</button>
  </div>
  <div class="perf-body">
    <div class="perf-grid" id="perfGrid"><div class="p-card" style="grid-column:1/-1"><div class="pl">טוען...</div></div></div>
    <div class="p-note" id="perfNote"></div>
  </div>
</div>

<div class="section">
  <div class="sec-hdr">
    <div class="sec-title">📈 ניירות ערך <span id="stockCount" style="color:var(--muted);font-weight:400;font-size:.8rem"></span></div>
    <button class="refresh-btn" onclick="refreshAll()">🔄 רענן</button>
  </div>
  <div class="sec-body">
    <div style="padding-bottom:13px;border-bottom:1px solid var(--border);margin-bottom:13px;">
      <div class="ai-badge">✨ Yahoo Finance + Claude AI</div>

      <div class="form-row">
        <div class="fg full">
          <label>מספר נייר ערך</label>
          <input type="text" id="fSecId" placeholder="1159169 / 5139886 / 5139910..." style="direction:ltr;text-align:left;">
        </div>
      </div>
      <div class="form-row">
        <div class="fg">
          <label>סכום השקעה (₪)</label>
          <input type="number" id="fAmount" placeholder="5000" min="1" style="direction:ltr;">
        </div>
        <div class="fg">
          <label>תאריך קנייה</label>
          <div style="display:flex;gap:4px;direction:ltr">
  <input type="number" id="fBuyDay" placeholder="DD" min="1" max="31" style="width:54px;padding:10px 6px;text-align:center;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:15px">
  <span style="align-self:center;color:var(--text2)">/</span>
  <input type="number" id="fBuyMonth" placeholder="MM" min="1" max="12" style="width:54px;padding:10px 6px;text-align:center;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:15px">
  <span style="align-self:center;color:var(--text2)">/</span>
  <input type="number" id="fBuyYear" placeholder="YYYY" min="2000" max="2099" style="width:80px;padding:10px 6px;text-align:center;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:15px">
</div>
        </div>
      </div>
      <div id="addErr" class="err-box"></div>
      <button class="btn btn-y" id="addBtn" onclick="addStock()">+ הוסף נייר ערך</button>
    </div>
    <div class="h-list" id="holdingsList"><div class="empty">עדיין אין ניירות ערך</div></div>
  </div>
</div>

<div class="section">
  <div class="sec-hdr"><div class="sec-title">💰 מזומן וחיסכון</div></div>
  <div class="sec-body">
    <div id="cashList"></div>
    <hr>
    <div class="form-row">
      <div class="fg"><label>תיאור</label><input type="text" id="fCashDesc" placeholder='קופ"ג, פיקדון...'></div>
      <div class="fg"><label>סכום (₪)</label><input type="number" id="fCashAmt" placeholder="0" min="0" style="direction:ltr;"></div>
    </div>
    <button class="btn btn-g" onclick="addCash()">+ הוסף סכום</button>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="overlay" id="editModal" style="display:none;" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal">
    <h3>✏️ עריכת <span id="editLabel"></span></h3>
    <input type="hidden" id="editId">
    <div class="form-row">
      <div class="fg"><label>סכום שהושקע (₪)</label><input type="number" id="editAmount" min="1" style="direction:ltr;"></div>
      <div class="fg"><label>תאריך קנייה</label><div style="display:flex;gap:4px;direction:ltr">
  <input type="number" id="editDay" placeholder="DD" min="1" max="31" style="width:54px;padding:10px 6px;text-align:center;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:15px">
  <span style="align-self:center;color:var(--text2)">/</span>
  <input type="number" id="editMonth" placeholder="MM" min="1" max="12" style="width:54px;padding:10px 6px;text-align:center;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:15px">
  <span style="align-self:center;color:var(--text2)">/</span>
  <input type="number" id="editYear" placeholder="YYYY" min="2000" max="2099" style="width:80px;padding:10px 6px;text-align:center;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:15px">
</div></div>
    </div>
    <div class="err-box" id="editErr"></div>
    <div class="modal-btns">
      <button class="btn btn-y" id="editSaveBtn" onclick="saveEdit()">💾 שמור</button>
      <button class="btn btn-c" onclick="document.getElementById('editModal').style.display='none'">ביטול</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
// Google Apps Script proxy (handles Yahoo Finance + USD/ILS conversion)
const PROXY_URL = "https://script.google.com/macros/s/AKfycbxbDqiq22h_UBi6RHpEcrw4pEPTNB_fY07NXAvxIcrCVXHsvBY5gNCrzUWMU5DZkheeaw/exec";

// ── STATE ─────────────────────────────────────────────────────────────────────
let holdings     = JSON.parse(localStorage.getItem('kHold5') || '[]');
let cashes       = JSON.parse(localStorage.getItem('kCash5') || '[]');
let kidName      = localStorage.getItem('kName') || 'הילד';
let anthropicKey = localStorage.getItem('kApiKey') || '';
let prices       = {};  // secId -> { cur, prev, name, updatedAt }
let usdIlsRate   = null;
let activePeriod = 'day';

document.getElementById('kidName').textContent = kidName;
const _today = new Date();
document.getElementById('fBuyDay').value   = _today.getDate();
document.getElementById('fBuyMonth').value = _today.getMonth() + 1;
document.getElementById('fBuyYear').value  = _today.getFullYear();

// ── DATE HELPERS ──────────────────────────────────────────────────────────────
function fmtDate(isoDate) {
  // Convert YYYY-MM-DD to DD/MM/YYYY
  if (!isoDate) return '';
  const [y, m, d] = isoDate.split('-');
  return d + '/' + m + '/' + y;
}

// ── PROXY FETCHER (Google Apps Script → Yahoo Finance) ───────────────────────
async function claudeFetchPrice(secId, dateStr = null) {
  try {
    let url = PROXY_URL + "?secId=" + encodeURIComponent(secId);
    if (dateStr) url += "&date=" + encodeURIComponent(dateStr);
    const resp = await fetch(url);
    if (!resp.ok) return { secId, found: false };
    const data = await resp.json();
    if (data.found && !data.prevClose) data.prevClose = data.price;
    return data;
  } catch(err) {
    console.error('Proxy error:', err);
    return { secId, found: false };
  }
}

// ── FETCH CURRENT PRICES FOR ALL HOLDINGS ─────────────────────────────────────
async function refreshAll() {
  if (!holdings.length) { render(); renderPerf(); setStatus('אין ניירות ערך'); return; }
  const unique = [...new Set(holdings.map(h => h.secId))];
  setStatus('<span class="spin"></span> מעדכן מחירים......');

  // Fetch all in parallel
  await Promise.all(unique.map(async secId => {
    const result = await claudeFetchPrice(secId);
    if (result.found) {
      prices[secId] = {
        cur:       result.price,
        prev:      result.prevClose || result.price,
        name:      result.name || secId,
        usdIls:    result.usdIls || null,
        updatedAt: new Date().toLocaleTimeString('he-IL', {hour:'2-digit',minute:'2-digit'})
      };
      // Update name on holdings
      holdings.forEach(h => { if (h.secId === secId && result.name) h.resolvedName = result.name; });
      if (result.usdIls) { usdIlsRate = result.usdIls; renderFxRate(); }
    }
  }));

  save(); render(); renderPerf();
  const ts = new Date().toLocaleTimeString('he-IL', {hour:'2-digit',minute:'2-digit'});
  setStatus(`<span class="dot"></span> עודכן ${ts} · ${unique.length} ניירות`);
}

// ── ADD STOCK ─────────────────────────────────────────────────────────────────
async function addStock() {
  const errEl  = document.getElementById('addErr');
  const show   = m => { errEl.textContent = m; errEl.style.display = 'block'; };
  errEl.style.display = 'none';

  const secId   = document.getElementById('fSecId').value.trim().replace(/\D/g, '');
  const amount  = parseFloat(document.getElementById('fAmount').value);
  const _d = document.getElementById('fBuyDay').value.padStart(2,'0');
  const _m = document.getElementById('fBuyMonth').value.padStart(2,'0');
  const _y = document.getElementById('fBuyYear').value;
  const buyDate = _y && _m && _d ? `${_y}-${_m}-${_d}` : '';

  if (!secId)                        return show('נא להכניס מספר נייר ערך');
  if (isNaN(amount) || amount <= 0)  return show('נא להכניס סכום השקעה תקין');
  if (!buyDate)                      return show('נא לבחור תאריך');
  if (new Date(buyDate) > new Date()) return show('תאריך לא יכול להיות בעתיד');

  const btn = document.getElementById('addBtn');
  btn.disabled = true; btn.textContent = '🤖 מחפש מחיר קנייה...';

  // Get historical price on purchase date
  const histResult = await claudeFetchPrice(secId, buyDate);
  if (!histResult.found || !histResult.price) {
    btn.disabled = false; btn.textContent = '+ הוסף נייר ערך';
    return show(`לא נמצא מחיר עבור נייר ${secId} בתאריך ${buyDate}`);
  }

  const buyPrice = histResult.price; // ILS
  const shares   = amount / buyPrice;

  btn.textContent = '🤖 מחפש מחיר נוכחי...';

  // Also fetch current price
  const curResult = await claudeFetchPrice(secId);
  if (curResult.found) {
    prices[secId] = {
      cur:       curResult.price,
      prev:      curResult.prevClose || curResult.price,
      name:      curResult.name || histResult.name || secId,
      usdIls:    curResult.usdIls || null,
      buyUsdIls: histResult.usdIls || null,
      updatedAt: new Date().toLocaleTimeString('he-IL', {hour:'2-digit',minute:'2-digit'})
    };
  }

  holdings.push({
    id:           Date.now(),
    secId,
    resolvedName: curResult.name || histResult.name || null,
    amount,
    buyPrice,   // ILS per unit
    shares,
    buyDate,
  });

  save();
  document.getElementById('fSecId').value   = '';
  document.getElementById('fAmount').value  = '';
  btn.disabled = false; btn.textContent = '+ הוסף נייר ערך';
  render(); renderPerf();
  const ts = new Date().toLocaleTimeString('he-IL', {hour:'2-digit',minute:'2-digit'});
  setStatus(`<span class="dot"></span> נוסף · ${ts}`);
}

// ── EDIT ──────────────────────────────────────────────────────────────────────
function openEdit(id) {
  const h = holdings.find(h => h.id === id); if (!h) return;
  document.getElementById('editId').value    = id;
  document.getElementById('editLabel').textContent = h.resolvedName || h.secId;
  document.getElementById('editAmount').value = h.amount;
  const _ep = (h.buyDate || '').split('-');
  document.getElementById('editDay').value   = _ep[2] ? parseInt(_ep[2]) : '';
  document.getElementById('editMonth').value = _ep[1] ? parseInt(_ep[1]) : '';
  document.getElementById('editYear').value  = _ep[0] || '';
  document.getElementById('editErr').style.display = 'none';
  document.getElementById('editModal').style.display = 'flex';
}

async function saveEdit() {
  const id     = parseInt(document.getElementById('editId').value);
  const amount = parseFloat(document.getElementById('editAmount').value);
  const _ed = document.getElementById('editDay').value.padStart(2,'0');
  const _em = document.getElementById('editMonth').value.padStart(2,'0');
  const _ey = document.getElementById('editYear').value;
  const date = _ey && _em && _ed ? `${_ey}-${_em}-${_ed}` : '';
  const errEl  = document.getElementById('editErr');
  if (isNaN(amount) || amount <= 0 || !date) { errEl.textContent = 'נא למלא את כל השדות'; errEl.style.display = 'block'; return; }
  const btn = document.getElementById('editSaveBtn'); btn.textContent = 'מחפש...'; btn.disabled = true;
  const h = holdings.find(h => h.id === id); if (!h) return;
  const result = await claudeFetchPrice(h.secId, date);
  if (!result.found) { errEl.textContent = 'לא נמצא מחיר לתאריך זה'; errEl.style.display = 'block'; btn.textContent = '💾 שמור'; btn.disabled = false; return; }
  h.amount = amount; h.buyDate = date; h.buyPrice = result.price; h.shares = amount / result.price;
  document.getElementById('editModal').style.display = 'none';
  btn.textContent = '💾 שמור'; btn.disabled = false;
  save(); render(); renderPerf();
}

function delHolding(id) {
  if (!confirm('למחוק?')) return;
  holdings = holdings.filter(h => h.id !== id);
  save(); render(); renderPerf();
}

// ── CASH ──────────────────────────────────────────────────────────────────────
function addCash() {
  const desc = document.getElementById('fCashDesc').value.trim() || 'חיסכון';
  const amt  = parseFloat(document.getElementById('fCashAmt').value);
  if (isNaN(amt) || amt <= 0) return alert('נא להכניס סכום תקין');
  cashes.push({ id: Date.now(), desc, amt });
  document.getElementById('fCashDesc').value = ''; document.getElementById('fCashAmt').value = '';
  save(); render();
}
function delCash(id) { if (!confirm('למחוק?')) return; cashes = cashes.filter(c => c.id !== id); save(); render(); }

function save() {
  localStorage.setItem('kHold5', JSON.stringify(holdings));
  localStorage.setItem('kCash5', JSON.stringify(cashes));
  localStorage.setItem('kName',  kidName);
}
function editName() { const n = prompt('שם הילד/ה:', kidName); if (n?.trim()) { kidName = n.trim(); document.getElementById('kidName').textContent = kidName; save(); } }

function openSettings() {
  document.getElementById('apiKeyInput').value = anthropicKey;
  document.getElementById('settingsModal').style.display = 'flex';
}
function closeSettings() {
  document.getElementById('settingsModal').style.display = 'none';
}
function saveSettings() {
  const key = document.getElementById('apiKeyInput').value.trim();
  anthropicKey = key;
  localStorage.setItem('kApiKey', key);
  closeSettings();
  setStatus(key ? '✅ API Key נשמר!' : '⚠️ API Key נמחק');
}

// ── FORMAT ────────────────────────────────────────────────────────────────────
const ils    = n => '₪' + Math.round(n).toLocaleString('he-IL');
const ilsDec = n => '₪' + n.toLocaleString('he-IL', {minimumFractionDigits:2, maximumFractionDigits:2});
const pct    = n => (n >= 0 ? '+' : '') + n.toFixed(1) + '%';

// ── PERF ──────────────────────────────────────────────────────────────────────
async function setPeriod(p, el) {
  activePeriod = p;
  document.querySelectorAll('.p-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  if (p === 'day') { renderPerf(); return; }

  // Fetch historical prices for month/year
  const now = new Date();
  let histDate;
  if (p === 'month') {
    histDate = new Date(now.getFullYear(), now.getMonth(), 1);
  } else {
    histDate = new Date(now.getFullYear(), 0, 1);
  }
  const dateStr = histDate.toISOString().split('T')[0];

  setStatus('<span class="spin"></span> מחפש מחירים היסטוריים...');
  const unique = [...new Set(holdings.map(h => h.secId))];
  await Promise.all(unique.map(async secId => {
    const result = await claudeFetchPrice(secId, dateStr);
    if (result.found && result.price) {
      if (!prices[secId]) prices[secId] = { cur: result.price, prev: result.price, name: result.name || secId };
      prices[secId].hist = result.price;
      prices[secId].histUsdIls = result.usdIls || null;
    }
  }));
  setStatus('');
  renderPerf();
}

function renderPerf() {
  if (!holdings.length) { document.getElementById('perfGrid').innerHTML = '<div class="p-card" style="grid-column:1/-1"><div class="pl">אין ניירות ערך</div></div>'; return; }
  const labels = { day:'יום המסחר הקודם', month:'תחילת החודש', year:'תחילת השנה' };
  let totChange = 0, totPast = 0;

  // Keep fixed order: same as holdings array
  const USD_SECS = ["1159169", "5139886"];
  const rows = holdings.map(h => {
    const px = prices[h.secId]; if (!px) return null;
    const pastPrice = activePeriod === 'day' ? (px.prev || px.cur) : (px.hist || px.cur);
    const cv = px.cur * h.shares, pv = pastPrice * h.shares;
    totChange += cv - pv;
    totPast   += pv;

    // For USD securities: also compute USD-only gain (strip out FX effect)
    let usdGain = null;
    if (USD_SECS.includes(h.secId) && px.usdIls) {
      const curFx  = px.usdIls;
      let   pastFx = curFx;
      if (activePeriod === 'day')   pastFx = curFx;
      if (activePeriod === 'month' || activePeriod === 'year') pastFx = px.histUsdIls || curFx;
      const curUsd  = px.cur / curFx;
      const pastUsd = pastPrice / pastFx;
      const cvUsd   = curUsd  * h.shares;
      const pvUsd   = pastUsd * h.shares;
      usdGain = { diff: cvUsd - pvUsd, diffP: pvUsd > 0 ? (cvUsd-pvUsd)/pvUsd*100 : 0,
                  fxDiff: (cv-pv) - (cvUsd-pvUsd)*curFx };
    }
    return { name: h.resolvedName || h.secId, secId: h.secId, diff: cv - pv, diffP: pv > 0 ? (cv-pv)/pv*100 : 0, usdGain };
  }).filter(Boolean);

  const totP = totPast > 0 ? (totChange/totPast)*100 : 0;
  const card = (lbl, val, vp, extra='') => {
    const cls = val>0?'pos':val<0?'neg':'neu';
    return `<div class="p-card"><div class="pl">${lbl}</div><div class="pv ${cls}">${val>=0?'+':''}${ils(val)}</div><div class="pv ${cls}" style="font-size:.74rem;margin-top:2px">${pct(vp)}</div>${extra}</div>`;
  };

  // Card 1: total change for period
  let g = card('שינוי בתקופה', totChange, totP);
  // Card 2: previous value
  g += `<div class="p-card"><div class="pl">שווי ${labels[activePeriod]}</div><div class="pv neu">${ils(totPast)}</div></div>`;
  // Cards 3+: each holding
  rows.forEach(r => {
    g += card(r.name, r.diff, r.diffP);
  });

  document.getElementById('perfGrid').innerHTML = g;
  document.getElementById('perfNote').textContent = `שינוי מאז ${labels[activePeriod]}`;
}

// ── RENDER HOLDINGS ───────────────────────────────────────────────────────────
function render() {
  document.getElementById('stockCount').textContent = holdings.length ? `(${holdings.length})` : '';
  const list = document.getElementById('holdingsList');
  let totInv = 0, totCur = 0;

  if (!holdings.length) { list.innerHTML = '<div class="empty">עדיין אין ניירות ערך · הוסף את הראשון!</div>'; }
  else {
    list.innerHTML = holdings.map(h => {
      const px      = prices[h.secId];
      const hasPx   = px != null;
      const curP    = hasPx ? px.cur : h.buyPrice;
      const curTot  = curP * h.shares;
      totInv += h.amount; if (hasPx) totCur += curTot;
      const gain    = curTot - h.amount;
      const gainP   = h.amount > 0 ? (gain / h.amount) * 100 : 0;
      const tax     = Math.max(0, gain) * 0.25;
      const net     = curTot - tax;
      const days    = Math.floor((Date.now() - new Date(h.buyDate)) / 86400000);
      const sd      = h.shares >= 1 ? h.shares.toFixed(2) : h.shares.toFixed(4);
      const tagCls  = !hasPx ? 'tag-p' : gainP >= 0 ? 'tag-g' : 'tag-l';
      const updTime = px?.updatedAt ? `· עודכן ${px.updatedAt}` : '';
      return `<div class="h-item">
        <div class="h-top">
          <div style="flex:1;min-width:0;">
            <div class="h-id">${h.secId}</div>
            <div class="h-name">${h.resolvedName || (hasPx ? px.name : '...')}</div>
            <div class="h-meta">${sd} יחידות · ${fmtDate(h.buyDate)} · ${days} ימים ${updTime}</div>
            <span class="tag ${tagCls}">${!hasPx ? '🤖 ממתין למחיר' : pct(gainP)}</span>
          </div>
          <div class="h-val">
            <div class="hcur">${hasPx ? ils(curTot) : '<span class="price-loading"></span>'}</div>
            <div class="hcost">השקעה: ${ils(h.amount)}</div>
          </div>
        </div>
        <div class="s-row">
          <div class="st"><div class="stl">מחיר נוכחי</div><div class="stv">${hasPx ? ilsDec(px.cur) : '—'}</div></div>
          <div class="st"><div class="stl">רווח / הפסד</div><div class="stv ${gain>=0?'pos':'neg'}">${hasPx ? (gain>=0?'+':'')+ils(gain) : '—'}</div></div>
          <div class="st"><div class="stl">אחרי מס</div><div class="stv">${hasPx ? ils(net) : '—'}</div></div>
        </div>
        <div class="h-actions">
          <button class="a-btn" onclick="openEdit(${h.id})">✏️ ערוך</button>
          <button class="a-btn del" onclick="delHolding(${h.id})">🗑 מחק</button>
        </div>
      </div>`;
    }).join('');
  }

  const cashEl  = document.getElementById('cashList');
  const totCash = cashes.reduce((s, c) => s + c.amt, 0);
  cashEl.innerHTML = !cashes.length ? '<div class="empty" style="padding:6px 0 12px">אין מזומן</div>'
    : cashes.map(c => `<div class="cash-row"><div style="font-weight:600">${c.desc}</div>
        <div style="display:flex;align-items:center;gap:9px">
          <span style="font-family:'Share Tech Mono',monospace;color:#70a0f0">${ils(c.amt)}</span>
          <button style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem" onclick="delCash(${c.id})">✕</button>
        </div></div>`).join('');

  if (holdings.length && totCur === 0) totCur = holdings.reduce((s, h) => s + h.buyPrice * h.shares, 0);
  const gain = totCur - totInv, tax = Math.max(0, gain) * 0.25, netSt = totCur - tax;
  document.getElementById('sStocks').textContent   = ils(totCur);
  document.getElementById('sCash').textContent     = ils(totCash);
  document.getElementById('sGross').textContent    = ils(totCur + totCash);
  document.getElementById('sNet').textContent      = ils(netSt + totCash);
  const gainTotal = (totCur + totCash) - (totInv + totCash);
  const tgEl = document.getElementById('sTotalGain');
  tgEl.textContent = (gain >= 0 ? '+' : '') + ils(gain);
  tgEl.style.color = gain >= 0 ? 'var(--accent2)' : 'var(--accent3)';
  const gEl = document.getElementById('sGain');
  if (holdings.length && totInv > 0) {
    gEl.textContent = `${gain>=0?'+':''}${ils(gain)} (${pct((gain/totInv)*100)})`;
    gEl.style.color = gain >= 0 ? 'var(--accent2)' : 'var(--accent3)';
  } else gEl.textContent = '';

  // Draw pie chart
  drawPie(totCur, cashes);
}

function drawPie(totStocks, cashes) {
  const canvas = document.getElementById('pieChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2, r = Math.min(W,H)/2 - 6;
  ctx.clearRect(0, 0, W, H);

  // Build slices
  const slices = [];
  if (totStocks > 0) slices.push({ label: 'ניירות ערך', val: totStocks, color: '#f0c060' });
  cashes.forEach((c, i) => {
    if (c.amt > 0) {
      const colors = ['#70a0f0','#60d4a0','#f07090','#c070f0','#60d0f0'];
      slices.push({ label: c.desc, val: c.amt, color: colors[i % colors.length] });
    }
  });
  if (!slices.length) {
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 2; ctx.stroke();
    return;
  }

  const total = slices.reduce((s, sl) => s + sl.val, 0);
  let startAngle = -Math.PI / 2;
  const gap = 0.03;

  slices.forEach((sl, i) => {
    const sweep = (sl.val / total) * Math.PI * 2 - gap;
    // Slice
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle + gap/2, startAngle + sweep + gap/2);
    ctx.closePath();
    ctx.fillStyle = sl.color;
    ctx.fill();

    // Inner label (only if slice big enough)
    const pct = sl.val / total;
    if (pct > 0.08) {
      const midAngle = startAngle + gap/2 + sweep/2;
      const lx = cx + (r * 0.62) * Math.cos(midAngle);
      const ly = cy + (r * 0.62) * Math.sin(midAngle);
      ctx.fillStyle = 'rgba(0,0,0,0.85)';
      ctx.font = 'bold 10px Heebo, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(Math.round(pct*100) + '%', lx, ly);
    }
    startAngle += sweep + gap;
  });

  // Center hole
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.42, 0, Math.PI * 2);
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--surface').trim() || '#1a1a24';
  ctx.fill();

  // Legend
  const legend = document.getElementById('pieLegend');
  if (legend) {
    legend.innerHTML = slices.map(sl => {
      const ils2 = n => '₪' + Math.round(n).toLocaleString('he-IL');
      return `<div style="display:flex;align-items:center;gap:6px;font-size:.68rem;">
        <span style="width:10px;height:10px;border-radius:3px;background:${sl.color};flex-shrink:0"></span>
        <span style="color:var(--text2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${sl.label}</span>
        <span style="font-family:'Share Tech Mono',monospace;color:var(--text)">${ils2(sl.val)}</span>
      </div>`;
    }).join('');
  }
}

function setStatus(h) { document.getElementById('status').innerHTML = h; }
function renderFxRate() {
  const el = document.getElementById('fxRate');
  if (!el || !usdIlsRate) return;
  el.innerHTML = `💱 $1 = ₪${usdIlsRate.toFixed(3)}`;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
render(); renderPerf();
if (holdings.length) {
  refreshAll();
} else {
  setStatus('מוכן · הוסף נייר ערך ראשון');
}
</script>
</body>
</html>
